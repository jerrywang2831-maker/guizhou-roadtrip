.day-card .day-num {

// ==================== MARKERS ====================
function createMarkers() {
  STOPS.forEach((stop, i) => {
    const color = stop.type === 'start' ? '#27ae60' :
                  stop.type === 'highlight' ? '#e94560' : '#2980b9';

    const content = `<div class="custom-marker${stop.type === 'start' ? ' start' : ''}${stop.type === 'highlight' ? ' end' : ''}" style="background:${color}" id="marker-${i}">${i + 1}</div>`;

    const marker = new AMap.Marker({
      position: [stop.lng, stop.lat],
      content: content,
      anchor: 'center',
      offset: new AMap.Pixel(0, 0),
      zIndex: stop.type === 'start' ? 110 : stop.type === 'highlight' ? 105 : 100,
    });

    // Info window with trip details
    const relevantDays = ITINERARY.filter(d => d.stopTo === i || (d.stopFrom === i && i > 0));
    let infoHTML = `<div class="amap-info-content"><h4>${stop.name}</h4>`;
    relevantDays.forEach(d => {
      infoHTML += `<p>📅 Day ${d.day}：${d.title}<br>🏞 ${d.sights.join('、')}<br>🍜 ${d.food.slice(0,3).join('、')}</p>`;
    });
    infoHTML += '</div>';

    const infoWindow = new AMap.InfoWindow({
      content: infoHTML,
      offset: new AMap.Pixel(0, -35),
    });

    marker.on('click', () => {
      infoWindow.open(map, marker.getPosition());
      // Also select the corresponding day
      const firstDay = ITINERARY.findIndex(d => d.stopTo === i || d.stopFrom === i);
      if (firstDay >= 0) selectDay(firstDay);
    });

    marker.setMap(map);
    markers.push({ marker, infoWindow, stopIndex: i });
  });
}

// ==================== ROUTE DRAWING ====================
function drawAllRoutes() {
  AMap.plugin('AMap.Driving', () => {
    const drivingColors = [
      '#3498db', '#2ecc71', '#1abc9c', '#9b59b6', '#e74c3c',
      '#f39c12', '#e91e63', '#00bcd4', '#ff5722', '#8bc34a',
      '#3f51b5', '#ff9800', '#009688', '#673ab7', '#cddc39',
      '#795548', '#e040fb', '#00e676'
    ];

    let completedG = 0, completedS = 0;
    const total = SEGMENTS.length;

    function createPolyline(path, color, style) {
      return new AMap.Polyline({
        path: path, strokeColor: color, strokeWeight: 4,
        strokeOpacity: 0.5, lineJoin: 'round', zIndex: 50,
        strokeStyle: style || 'solid',
      });
    }

    function extractPath(result) {
      if (result && result.routes && result.routes.length > 0) {
        const steps = result.routes[0].steps;
        let path = [];
        steps.forEach(s => { path = path.concat(s.path); });
        return path;
      }
      return null;
    }

    function straightFallback(seg) {
      return [[STOPS[seg.from].lng, STOPS[seg.from].lat], [STOPS[seg.to].lng, STOPS[seg.to].lat]];
    }

    function searchRoute(origin, dest, policy, callback) {
      const d = new AMap.Driving({ policy: policy });
      d.search(origin, dest, (status, result) => {
        callback(status === 'complete' ? extractPath(result) : null);
      });
    }

    SEGMENTS.forEach((seg, idx) => {
      const origin = new AMap.LngLat(STOPS[seg.from].lng, STOPS[seg.from].lat);
      const dest = new AMap.LngLat(STOPS[seg.to].lng, STOPS[seg.to].lat);
      const color = drivingColors[idx % drivingColors.length];
      const fbPath = straightFallback(seg);

      // === 国道路线：先试 LEAST_FEE，失败则回退到 LEAST_TIME ===
      setTimeout(() => {
        searchRoute(origin, dest, AMap.DrivingPolicy.LEAST_FEE, (path) => {
          if (path) {
            const pl = createPolyline(path, color);
            pl.setMap(routeMode === 'g' ? map : null);
            routeLinesG[idx] = { polyline: pl, segIndex: idx, color: color, path: path };
          } else {
            // 国道搜索失败，用高速路线作为 fallback
            searchRoute(origin, dest, AMap.DrivingPolicy.LEAST_TIME, (fbPath2) => {
              const finalPath = fbPath2 || fbPath;
              const pl = createPolyline(finalPath, color, fbPath2 ? 'solid' : 'dashed');
              pl.setMap(routeMode === 'g' ? map : null);
              routeLinesG[idx] = { polyline: pl, segIndex: idx, color: color, path: finalPath };
              finishG();
            });
            return;
          }
          finishG();
        });
        function finishG() { completedG++; if (completedG >= total && completedS >= total) highlightDayRoute(activeDay); }
      }, idx * 500);

      // === 高速路线：LEAST_TIME, 失败 fallback straight line ===
      setTimeout(() => {
        searchRoute(origin, dest, AMap.DrivingPolicy.LEAST_TIME, (path) => {
          const finalPath = path || fbPath;
          const pl = createPolyline(finalPath, color, path ? 'solid' : 'dashed');
          pl.setMap(routeMode === 's' ? map : null);
          routeLinesS[idx] = { polyline: pl, segIndex: idx, color: color, path: finalPath };
          completedS++;
          if (completedG >= total && completedS >= total) highlightDayRoute(activeDay);
        });
      }, idx * 500 + 250);
    });
  });
}

// ==================== HIGHLIGHT CURRENT DAY ====================
function getActiveLines() {
  return routeMode === 'g' ? routeLinesG : routeLinesS;
}

function highlightDayRoute(dayIndex) {
  const day = ITINERARY[dayIndex];
  const lines = getActiveLines();

  // Reset all active polylines to default style
  lines.forEach(p => {
    if (p && p.polyline) {
      p.polyline.setOptions({
        strokeWeight: 4, strokeOpacity: 0.5,
        strokeColor: p.color, zIndex: 50,
      });
    }
  });

  // Reset all markers
  markers.forEach(m => {
    const el = document.getElementById(`marker-${m.stopIndex}`);
    if (el) el.classList.remove('highlight');
  });

  // Highlight current segment
  if (day.segIndex >= 0 && lines[day.segIndex]) {
    lines[day.segIndex].polyline.setOptions({
      strokeWeight: 8, strokeOpacity: 1,
      strokeColor: '#f39c12', zIndex: 90,
    });
  }

  // Highlight current stop markers
  [day.stopFrom, day.stopTo].forEach(si => {
    const el = document.getElementById(`marker-${si}`);
    if (el) el.classList.add('highlight');
  });

  updateDayLabel();

  const card = document.getElementById(`day-card-${dayIndex}`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
  }
}

function prevDay() {

function nextDay() {
  const newDay = (activeDay + 1) % ITINERARY.length;
  selectDay(newDay);
}

function scrollToDay(direction) {
  if (direction < 0) prevDay();
  else nextDay();
}

// ==================== WEATHER ====================
async function fetchWeather() {
  // Get unique overnight stops from ITINERARY
  const stopsToFetch = [];
  const seen = new Set();
  ITINERARY.forEach(d => {
    if (d.stopTo >= 0 && !seen.has(d.stopTo) && d.stopTo !== d.stopFrom) {
      seen.add(d.stopTo);
      stopsToFetch.push(d.stopTo);
    }
  });

  // Fetch 16-day forecast for each unique stop
  const baseDate = new Date(2026, 4, 30); // May 30, 2026
  for (const stopId of stopsToFetch) {
    const stop = STOPS[stopId];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${stop.lat}&longitude=${stop.lng}&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max&timezone=Asia/Shanghai&forecast_days=16`;
    try {
      const resp = await fetch(url);
      const data = await resp.json();
      weatherCache[stopId] = data.daily.time.map((t, i) => ({
        date: t,
        max: Math.round(data.daily.temperature_2m_max[i]),
        min: Math.round(data.daily.temperature_2m_min[i]),
        code: data.daily.weather_code[i],
        precip: data.daily.precipitation_probability_max[i],
      }));
    } catch(e) { console.warn('Weather fetch failed for', stop.name, e); }
  }
  renderSidebar(); // re-render with weather
}

function getWeatherForDay(dayObj) {
  const stopId = dayObj.stopTo >= 0 ? dayObj.stopTo : (dayObj.stopFrom >= 0 ? dayObj.stopFrom : -1);
  if (stopId < 0 || !weatherCache[stopId]) return null;
  const dayIdx = dayObj.day - 1; // Day 1 = index 0
  if (dayIdx >= weatherCache[stopId].length) return null;
  return weatherCache[stopId][dayIdx];
}

// ==================== START ====================
init();
</script>
