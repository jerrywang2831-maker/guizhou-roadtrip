.day-card .day-meta { display: flex; gap: 16px; margin-top: 6px; font-size: 11px; color: #667788; }

let activeDay = 0;
let allRoutePaths = []; // store all driving paths for re-drawing

// ==================== INIT ====================
function init() {
  // Verify API key
  if (AMAP_KEY === 'YOUR_AMAP_KEY_HERE') {
    document.getElementById('map').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;background:#1a1a2e;color:#e94560;font-size:16px;text-align:center;padding:40px;">
        <div>
          <p style="font-size:48px;margin-bottom:16px;">🗺️</p>
          <p style="margin-bottom:8px;"><strong>请配置高德地图 API Key</strong></p>
          <p style="font-size:13px;color:#8899aa;">打开 index.html，将第 232 行的 <code>YOUR_AMAP_KEY_HERE</code><br>替换为你的高德 JS API Key</p>
          <p style="font-size:12px;color:#667788;margin-top:8px;">申请地址：<a href="https://console.amap.com/dev/key/app" target="_blank" style="color:#2980b9;">https://console.amap.com/dev/key/app</a></p>
        </div>
      </div>`;
    return;
  }

  renderSidebar();
  loadAmap();
}

// ==================== SIDEBAR RENDERING ====================
function renderSidebar() {
  const list = document.getElementById('day-list');
  list.innerHTML = ITINERARY.map((d, i) => `
    <div class="day-card${i === activeDay ? ' active' : ''}" id="day-card-${i}" onclick="selectDay(${i})">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="day-num">Day ${d.day}</span>
        <span class="day-date">${d.date}</span>
      </div>
      <div class="day-title">${d.title}</div>
      <div class="day-route">🛣 ${d.route}</div>
      <div class="day-meta">
        <span>🏞 ${d.sights.length}个景点</span>
        <span>🍜 ${d.food.length}个美食</span>
      </div>
      <div class="day-detail">
        <div class="detail-section"><strong>🏞 景点：</strong>${d.sights.join('、')}</div>
        <div class="detail-section"><strong>🍜 美食：</strong>${d.food.join('、')}</div>
        <div class="detail-section"><strong>🏨 住宿：</strong>${d.hotel}</div>
        ${d.note ? `<div class="detail-section"><strong>💡 提示：</strong>${d.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ==================== AMAP LOADING ====================
function loadAmap() {
  const script = document.createElement('script');
  script.src = `https://webapi.amap.com/v2/maps?v=2.0&key=${AMAP_KEY}&plugin=AMap.Driving`;
  script.onload = initMap;
  script.onerror = () => {
    document.getElementById('map').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;background:#1a1a2e;color:#e94560;font-size:16px;text-align:center;padding:40px;">
        <div>
          <p style="font-size:48px;margin-bottom:16px;">⚠️</p>
          <p>高德地图加载失败</p>
          <p style="font-size:13px;color:#8899aa;margin-top:8px;">请检查 API Key 是否正确，以及网络连接。</p>
        </div>
      </div>`;
  };
  document.head.appendChild(script);
}

// ==================== MAP INIT ====================
function initMap() {
  map = new AMap.Map('map', {
    center: [110.5, 29.5],
    zoom: 7,
    mapStyle: 'amap://styles/dark',
    features: ['bg', 'road', 'building'],
    viewMode: '3D',
    pitch: 40,
  });

  // Add scale control
  map.addControl(new AMap.Scale());

  // Create markers
  createMarkers();

  // Draw routes
  drawAllRoutes();

  // Initial selection
  selectDay(0);

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') prevDay();
    if (e.key === 'ArrowRight') nextDay();
  });
}

// ==================== MARKERS ====================
function createMarkers() {
  STOPS.forEach((stop, i) => {
    const color = stop.type === 'start' ? '#27ae60' :
                  stop.type === 'highlight' ? '#e94560' : '#2980b9';

    const content = `<div class="custom-marker${stop.type === 'start' ? ' start' : ''}${stop.type === 'highlight' ? ' end' : ''}" style="background:${color}" id="marker-${i}">${i + 1}</div>`;

    const marker = new AMap.Marker({
      position: [stop.lng, stop.lat],
      content: content,
      anchor: 'center',
      offset: new AMap.Pixel(0, 0),
      zIndex: stop.type === 'start' ? 110 : stop.type === 'highlight' ? 105 : 100,
    });

    // Info window with trip details
    const relevantDays = ITINERARY.filter(d => d.stopTo === i || (d.stopFrom === i && i > 0));
    let infoHTML = `<div class="amap-info-content"><h4>${stop.name}</h4>`;
    relevantDays.forEach(d => {
      infoHTML += `<p>📅 Day ${d.day}：${d.title}<br>🏞 ${d.sights.join('、')}<br>🍜 ${d.food.slice(0,3).join('、')}</p>`;
    });
    infoHTML += '</div>';

    const infoWindow = new AMap.InfoWindow({
      content: infoHTML,
      offset: new AMap.Pixel(0, -35),
    });

    marker.on('click', () => {
      infoWindow.open(map, marker.getPosition());
      // Also select the corresponding day
      const firstDay = ITINERARY.findIndex(d => d.stopTo === i || d.stopFrom === i);
      if (firstDay >= 0) selectDay(firstDay);
    });

    marker.setMap(map);
    markers.push({ marker, infoWindow, stopIndex: i });
  });
}

// ==================== ROUTE DRAWING ====================
function drawAllRoutes() {
  AMap.plugin('AMap.Driving', () => {
    const drivingColors = [
      '#3498db', '#2ecc71', '#1abc9c', '#9b59b6', '#e74c3c',
      '#f39c12', '#e91e63', '#00bcd4', '#ff5722', '#8bc34a',
      '#3f51b5', '#ff9800', '#009688', '#673ab7', '#cddc39',
      '#795548'
    ];

    // Draw routes sequentially with delay to respect API rate limits
    let completedCount = 0;

    SEGMENTS.forEach((seg, idx) => {
      const driving = new AMap.Driving({
        policy: AMap.DrivingPolicy.LEAST_TIME,
      });

      const origin = STOPS[seg.from];
      const dest = STOPS[seg.to];

      setTimeout(() => {
        driving.search(
          new AMap.LngLat(origin.lng, origin.lat),
          new AMap.LngLat(dest.lng, dest.lat),
          (status, result) => {
            if (status === 'complete' && result.routes && result.routes.length > 0) {
              const steps = result.routes[0].steps;
              let path = [];
              steps.forEach(step => {
                path = path.concat(step.path);
              });

              const polyline = new AMap.Polyline({
                path: path,
                strokeColor: drivingColors[idx % drivingColors.length],
                strokeWeight: 4,
                strokeOpacity: 0.5,
                lineJoin: 'round',
                zIndex: 50,
              });
              polyline.setMap(map);
              polylines.push({ polyline, segIndex: idx, color: drivingColors[idx % drivingColors.length] });
              allRoutePaths[idx] = { path, color: drivingColors[idx % drivingColors.length] };
            } else {
              // Fallback: draw straight line
              const fallbackPath = [
                [origin.lng, origin.lat],
                [dest.lng, dest.lat]
              ];
              const polyline = new AMap.Polyline({
                path: fallbackPath,
                strokeColor: drivingColors[idx % drivingColors.length],
                strokeWeight: 3,
                strokeOpacity: 0.4,
                strokeStyle: 'dashed',
                zIndex: 50,
              });
              polyline.setMap(map);
              polylines.push({ polyline, segIndex: idx, color: drivingColors[idx % drivingColors.length] });
              allRoutePaths[idx] = { path: fallbackPath, color: drivingColors[idx % drivingColors.length] };
            }

            completedCount++;
            if (completedCount === SEGMENTS.length) {
              highlightDayRoute(activeDay);
            }
          }
        );
      }, idx * 200); // Stagger requests by 200ms
    });
  });
}

// ==================== HIGHLIGHT CURRENT DAY ====================
function highlightDayRoute(dayIndex) {
  const day = ITINERARY[dayIndex];

  // Reset all polylines
  polylines.forEach(p => {
    p.polyline.setOptions({
      strokeWeight: 4,
      strokeOpacity: 0.5,
      strokeColor: p.color,
      zIndex: 50,
    });
  });

  // Reset all markers
  markers.forEach(m => {
    const el = document.getElementById(`marker-${m.stopIndex}`);
    if (el) el.classList.remove('highlight');
  });

  // Highlight current segment
  if (day.segIndex >= 0 && polylines[day.segIndex]) {
    polylines[day.segIndex].polyline.setOptions({
      strokeWeight: 8,
      strokeOpacity: 1,
      strokeColor: '#f39c12',
      zIndex: 90,
    });
  }

  // Highlight current stop markers
  const highlightStops = [day.stopFrom, day.stopTo];
  highlightStops.forEach(si => {
    const el = document.getElementById(`marker-${si}`);
    if (el) el.classList.add('highlight');
  });

  // Update day label
  document.getElementById('current-day-label').textContent = `Day ${day.day}`;

  // Scroll sidebar
  const card = document.getElementById(`day-card-${dayIndex}`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Update active state
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
  }
}

// ==================== DAY SELECTION ====================
function selectDay(dayIndex) {
  activeDay = dayIndex;
  const day = ITINERARY[dayIndex];
  const destStop = STOPS[day.stopTo];

  // Fly to destination
  map.panTo([destStop.lng, destStop.lat]);
  map.setZoom(10);

  // Highlight route and card
  highlightDayRoute(dayIndex);

  // Update sidebar
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`day-card-${dayIndex}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function prevDay() {
  const newDay = (activeDay - 1 + ITINERARY.length) % ITINERARY.length;
  selectDay(newDay);
}

function nextDay() {
  const newDay = (activeDay + 1) % ITINERARY.length;
  selectDay(newDay);
}

function scrollToDay(direction) {
  if (direction < 0) prevDay();
  else nextDay();
}

// ==================== MAP CONTROLS ====================
function zoomIn() { map.zoomIn(); }
function zoomOut() { map.zoomOut(); }

function focusOverview() {
  map.setZoomAndCenter(7, [110.5, 29.5]);
  // Reset all highlights
  polylines.forEach(p => {
    p.polyline.setOptions({
      strokeWeight: 4,
      strokeOpacity: 0.5,
      strokeColor: p.color,
      zIndex: 50,
    });
  });
  markers.forEach(m => {
    const el = document.getElementById(`marker-${m.stopIndex}`);
    if (el) el.classList.remove('highlight');
  });
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
  document.getElementById('current-day-label').textContent = '全景';
}

// ==================== START ====================
window.onload = init;
</script>
</body>
</html>
